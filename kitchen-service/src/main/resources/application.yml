server:
  port: 8083

spring:
  application:
    name: kitchen-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/kitchen_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
