server:
  port: 8081

spring:
  application:
    name: order-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

camunda:
  bpm:
    database:
      schema-update: true
    history-level: full
    webapp:
      index-redirect-enabled: true
    admin-user:
      id: admin
      password: admin
      firstName: Admin
      lastName: User
      email: admin@foodordering.com
